<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1A1510"/>
  <!-- Lotus petals -->
  <g fill="none" stroke="#C09535" stroke-width="1.6" stroke-linecap="round">
    <!-- centre circle -->
    <circle cx="32" cy="32" r="5" fill="#C09535" stroke="none"/>
    <!-- 8 petals -->
    <ellipse cx="32" cy="18" rx="3.5" ry="7" fill="#C09535" opacity=".9" stroke="none"/>
    <ellipse cx="32" cy="46" rx="3.5" ry="7" fill="#C09535" opacity=".9" stroke="none"/>
    <ellipse cx="18" cy="32" rx="7" ry="3.5" fill="#C09535" opacity=".9" stroke="none"/>
    <ellipse cx="46" cy="32" rx="7" ry="3.5" fill="#C09535" opacity=".9" stroke="none"/>
    <ellipse cx="22" cy="22" rx="3.5" ry="7" fill="#C09535" opacity=".75" stroke="none" transform="rotate(-45 22 22)"/>
    <ellipse cx="42" cy="22" rx="3.5" ry="7" fill="#C09535" opacity=".75" stroke="none" transform="rotate(45 42 22)"/>
    <ellipse cx="22" cy="42" rx="3.5" ry="7" fill="#C09535" opacity=".75" stroke="none" transform="rotate(45 22 42)"/>
    <ellipse cx="42" cy="42" rx="3.5" ry="7" fill="#C09535" opacity=".75" stroke="none" transform="rotate(-45 42 42)"/>
  </g>
</svg>
